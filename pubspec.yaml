name: peblo_story_buddy
description: A kid-friendly AI Story Buddy and data-driven quiz component for Peblo Flutter Intern Challenge.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  flutter_tts: ^4.2.5
  confetti: ^0.8.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
